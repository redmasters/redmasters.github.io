# Hugo configuration file
title: Erasmo Jr.
defaultContentLanguage: pt-br
languages:
  en:
    languageName: English
    weight: 2
  pt-br:
    languageName: Portugues-Brasil
    weight: 1
  
# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Contact ↗
      url: "https://github.com/redmasters"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/redmasters/redblogsite"
      params:
        icon: github

enableGitInfo: true
params:
  displayUpdateDate: true
  dateFormat: "2 January, 2006"
  blog:
    list:
      displayTags: true
  toc:
    displayTags: true
    
  navbar:
    displayTitle: true
    displayLogo: true
  theme:
    default: dark
    displayToggle: true

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
